  # Training hints — progressive hint text
  hint.singles.l1: "Look at cell {0}."
  hint.singles.l2_region: "Focus on {0} — count the candidates."
  hint.singles.l2_no_region: "Count the candidates in cell {0}."
  hint.singles.l3: "The value is {0}."
  hint.subsets.l1_region: "Focus on {0}."
  hint.subsets.l1_no_region: "Look for cells that share the same candidates in a unit."
  hint.subsets.l2_values: "These cells form a [{0}] subset. Values in the subset can only go in these cells — eliminate them from other cells in the region."
  hint.subsets.l2_no_values: "These cells form the subset. Values in the subset can only go in these cells — eliminate them from other cells in the region."
  hint.subsets.l3: "Eliminate candidates from cells that see all subset cells."
  hint.intersections.l1_value: "Look for value {0} confined to an intersection."
  hint.intersections.l1_no_value: "Look for a candidate confined to the intersection of a box and a line."
  hint.intersections.l2: "The intersection cells. The candidate is confined to these cells — eliminate it from other cells in the line or box outside this intersection."
  hint.intersections.l3: "Eliminate the candidate from cells outside the intersection."
  hint.fish.l1_value: "Look for a fish pattern on value {0}."
  hint.fish.l1_no_value: "Look for a fish pattern (rows/columns with restricted candidate positions)."
  hint.fish.l2: "Base and cover sets. Blue cells are the base set (rows/columns where the candidate is restricted). Green cells are the cover set. Eliminate the candidate from cover set cells that aren't in the base set."
  hint.fish.l3: "Eliminate the candidate from cover set cells outside the base set."
  hint.wings.l1: "Find the pivot cell at {0}."
  hint.wings.l2: "Pivot and wing cells. The orange pivot connects to the green wings. Candidates shared by both wings can be eliminated from cells that see all wing endpoints."
  hint.wings.l3: "Eliminate the shared candidate from cells that see all wing endpoints."
  hint.single_digit.l1_value: "Look for conjugate pairs on value {0}."
  hint.single_digit.l1_no_value: "Look for conjugate pairs (cells where a digit appears exactly twice in a unit)."
  hint.single_digit.l2: "The chain cells. These cells form conjugate pairs (a digit appears exactly twice in a unit). Follow the alternating pattern to find eliminations."
  hint.single_digit.l3: "Cells that see both endpoints of the pattern can be eliminated."
  hint.coloring.l1_value: "Build a coloring chain on value {0}."
  hint.coloring.l1_no_value: "Start coloring conjugate pairs with two alternating colors."
  hint.coloring.l2: "The coloring chain. Blue and green are two alternating colors — one must be true, one false. Cells that see both colors can have the candidate eliminated."
  hint.coloring.l3: "One color must be false — eliminate from cells that see both colors."
  hint.unique_rect.l1: "Look for a deadly pattern — four cells forming a rectangle across two boxes."
  hint.unique_rect.l2: "The rectangle corners. These four cells across two boxes form a potential deadly pattern. To keep the puzzle unique, eliminate the candidate that would complete the rectangle."
  hint.unique_rect.l3: "To avoid the deadly pattern, eliminate the candidate that would complete it."
  hint.chains.l1_pos: "Start the chain from cell {0}."
  hint.chains.l1_no_pos: "Look for a chain of linked cells with alternating strong/weak links."
  hint.chains.l2: "The chain path. Follow the alternating strong (blue) and weak (green) links. The chain's logic forces a conclusion at the endpoints."
  hint.chains.l3_placement: "All chains lead to value {0} at {1}."
  hint.chains.l3_elimination: "Eliminate candidates that contradict the chain logic."
  hint.set_logic.l1: "Look for an Almost Locked Set (a group of N cells with N+1 candidates)."
  hint.set_logic.l2: "The ALS cells and restricted common. An ALS is N cells with N+1 candidates. The restricted common candidate links the sets — eliminations apply to cells that see all relevant ALS members."
  hint.set_logic.l3: "Eliminate candidates from cells that see all relevant ALS members."
  hint.special.l1: "Look for the cell with three candidates (the only non-bivalue cell)."
  hint.special.l2: "The key cell is {0}."

  # Technique descriptions — what_it_is and what_to_look_for
  tech.desc.naked_single.what_it_is: "A cell has only one possible candidate left. All other values are eliminated by row, column, and box constraints."
  tech.desc.naked_single.what_to_look_for: "Look for cells where 8 of the 9 values are already present in the cell's row, column, or box."
  tech.desc.hidden_single.what_it_is: "A value can only go in one cell within a row, column, or box. Even though the cell may have multiple candidates, only this value has no other place in the region."
  tech.desc.hidden_single.what_to_look_for: "For each region, check if any value has only one possible cell."
  tech.desc.naked_pair.what_it_is: "Two cells in the same region each contain exactly the same two candidates. Those two values must go in those two cells, so they can be eliminated from all other cells in the region."
  tech.desc.naked_pair.what_to_look_for: "Find two cells in a row, column, or box that share the same pair of candidates."
  tech.desc.naked_triple.what_it_is: "Three cells in a region collectively contain exactly three candidates. Each cell has a subset of those three values. Those values can be eliminated from other cells in the region."
  tech.desc.naked_triple.what_to_look_for: "Find three cells in a region whose combined candidates form a set of exactly three values."
  tech.desc.hidden_pair.what_it_is: "Two values in a region appear as candidates in exactly the same two cells. Other candidates in those two cells can be eliminated."
  tech.desc.hidden_pair.what_to_look_for: "For each region, find two values that appear only in the same two cells."
  tech.desc.hidden_triple.what_it_is: "Three values in a region appear as candidates in exactly three cells. Other candidates in those cells can be eliminated."
  tech.desc.hidden_triple.what_to_look_for: "For each region, find three values confined to exactly three cells."
  tech.desc.pointing_pair.what_it_is: "A candidate in a box is confined to a single row or column. That candidate can be eliminated from the rest of that row or column outside the box."
  tech.desc.pointing_pair.what_to_look_for: "In each box, check if a candidate appears only in one row or one column."
  tech.desc.box_line_reduction.what_it_is: "A candidate in a row or column is confined to a single box. That candidate can be eliminated from the rest of the box outside that row or column."
  tech.desc.box_line_reduction.what_to_look_for: "In each row/column, check if a candidate appears only within one box."
  tech.desc.naked_quad.what_it_is: "Four cells in a region collectively contain exactly four candidates. Those values can be eliminated from other cells in the region."
  tech.desc.naked_quad.what_to_look_for: "Find four cells in a region whose combined candidates form a set of exactly four values."
  tech.desc.hidden_quad.what_it_is: "Four values in a region appear as candidates in exactly four cells. Other candidates in those cells can be eliminated."
  tech.desc.hidden_quad.what_to_look_for: "For each region, find four values confined to exactly four cells."
  tech.desc.x_wing.what_it_is: "A candidate appears in exactly two cells in each of two rows, and those cells are in the same two columns. The candidate can be eliminated from other cells in those columns."
  tech.desc.x_wing.what_to_look_for: "Find a candidate forming a rectangle pattern: two rows, two columns, four cells."
  tech.desc.xy_wing.what_it_is: "A pivot cell with candidates {A,B} sees two wing cells: one with {A,C} and one with {B,C}. Value C can be eliminated from any cell that sees both wings."
  tech.desc.xy_wing.what_to_look_for: "Find a bivalue cell (pivot) that sees two other bivalue cells sharing one candidate each."
  tech.desc.swordfish.what_it_is: "A candidate appears in 2-3 cells in each of three rows, and those cells fall in exactly three columns. The candidate can be eliminated from other cells in those columns."
  tech.desc.swordfish.what_to_look_for: "Extend the X-Wing pattern to three rows and three columns."
  tech.desc.skyscraper.what_it_is: "Two conjugate pairs for a digit share one endpoint in the same row or column. The digit can be eliminated from cells that see both non-shared endpoints."
  tech.desc.skyscraper.what_to_look_for: "Find two rows (or columns) each with exactly two cells for a digit, sharing one column (or row)."
  tech.desc.two_string_kite.what_it_is: "A conjugate pair in a row and a conjugate pair in a column are connected through a box. The digit can be eliminated from the cell that sees both unconnected endpoints."
  tech.desc.two_string_kite.what_to_look_for: "Find a row pair and column pair for the same digit connected via a shared box."
  tech.desc.xyz_wing.what_it_is: "A pivot cell with candidates {A,B,C} sees a wing with {A,B} and a wing with {A,C}. Value A can be eliminated from cells that see all three cells."
  tech.desc.xyz_wing.what_to_look_for: "Find a trivalue pivot seeing two bivalue wings that each share two candidates with the pivot."
  tech.desc.unique_rectangle.what_it_is: "Four cells forming a rectangle across two boxes would create a deadly pattern (two solutions) if they all had the same two candidates. Extra candidates in some cells can force eliminations to avoid this ambiguity."
  tech.desc.unique_rectangle.what_to_look_for: "Find four cells in a rectangle across two boxes sharing the same two candidates."
  tech.desc.w_wing.what_it_is: "Two cells with the same pair of candidates {A,B} are connected by a strong link on value A. Value B can be eliminated from cells that see both endpoints."
  tech.desc.w_wing.what_to_look_for: "Find two identical bivalue cells connected by a conjugate pair on one of their values."
  tech.desc.simple_coloring.what_it_is: "For a single digit, build chains of conjugate pairs and assign two colors. If both colors appear in the same region, one color is false and its candidates are eliminated."
  tech.desc.simple_coloring.what_to_look_for: "Pick a digit, trace conjugate pairs, color alternately. Check for color conflicts."
  tech.desc.finned_x_wing.what_it_is: "An X-Wing pattern with one extra candidate cell (the fin) in the same box as a corner. Eliminations are restricted to cells that see both the fin and the X-Wing column."
  tech.desc.finned_x_wing.what_to_look_for: "Find an X-Wing where one row has an extra candidate cell in the same box."
  tech.desc.remote_pairs.what_it_is: "A chain of bivalue cells all containing the same pair {A,B}, where each adjacent pair shares a region. Cells seeing both endpoints of an even-length chain lose both values."
  tech.desc.remote_pairs.what_to_look_for: "Find a chain of identical bivalue cells connected through shared regions."
  tech.desc.bug.what_it_is: "If all unsolved cells have exactly two candidates except one cell with three, the puzzle would have multiple solutions unless the trivalue cell is set to the value that appears three times in its row, column, or box."
  tech.desc.bug.what_to_look_for: "Check if only one cell has more than two candidates. If so, find its odd-count value."
  tech.desc.jellyfish.what_it_is: "A candidate appears in 2-4 cells in each of four rows, and those cells fall in exactly four columns. The candidate can be eliminated from other cells in those columns."
  tech.desc.jellyfish.what_to_look_for: "Extend the Swordfish pattern to four rows and four columns."
  tech.desc.finned_swordfish.what_it_is: "A Swordfish pattern with extra candidate cells (fins) in the same box. Eliminations are restricted to cells seeing both the fin box and the Swordfish columns."
  tech.desc.finned_swordfish.what_to_look_for: "Find a Swordfish where one row has extra candidates in the same box."
  tech.desc.empty_rectangle.what_it_is: "A digit's candidates in a box form an L-shape or cross, leaving an empty rectangle. Combined with a conjugate pair outside the box, this eliminates the digit from a target cell."
  tech.desc.empty_rectangle.what_to_look_for: "Find a box where a digit's candidates leave an empty rectangle, connected to a conjugate pair."
  tech.desc.wxyz_wing.what_it_is: "A four-cell wing pattern: a pivot and three wings collectively contain four candidates, and a shared candidate Z can be eliminated from cells seeing all cells containing Z."
  tech.desc.wxyz_wing.what_to_look_for: "Find a group of four cells with exactly four combined candidates sharing a common value."
  tech.desc.finned_jellyfish.what_it_is: "A Jellyfish pattern with extra fin cells in the same box. Eliminations are restricted to cells seeing both the fin box and the Jellyfish columns."
  tech.desc.finned_jellyfish.what_to_look_for: "Find a Jellyfish where one row has extra candidates forming a fin."
  tech.desc.xy_chain.what_it_is: "A chain of bivalue cells where consecutive cells share a candidate value, alternating between the two candidates. The value shared by the chain's endpoints can be eliminated from cells that see both endpoints."
  tech.desc.xy_chain.what_to_look_for: "Build a chain of bivalue cells connected by shared candidates. Check the endpoints."
  tech.desc.multi_coloring.what_it_is: "Build separate conjugate pair chains (clusters) for a digit and color each. When two clusters interact (cells in different clusters see each other), eliminations can be made from cells that see conflicting colors across clusters."
  tech.desc.multi_coloring.what_to_look_for: "Color multiple conjugate chains for one digit, then check cross-cluster interactions."
  tech.desc.als_xz.what_it_is: "Two Almost Locked Sets (each has N cells with N+1 candidates) share a restricted common candidate X. A second common candidate Z can be eliminated from cells that see all Z-cells in both sets."
  tech.desc.als_xz.what_to_look_for: "Find two groups of cells that are almost locked, sharing a restricted common candidate."
  tech.desc.sue_de_coq.what_it_is: "An intersection of a line and box contains 2-3 cells whose candidates can be covered by two Almost Locked Sets (one from the line remainder, one from the box remainder). Extra ALS candidates can be eliminated from their respective remainders."
  tech.desc.sue_de_coq.what_to_look_for: "Find an intersection where candidates can be partitioned into two covering ALS."
  tech.desc.forcing_chain.what_it_is: "For a cell with 2-3 candidates, assume each candidate is true and propagate the consequences. If all assumptions lead to the same conclusion (a placement or elimination), that conclusion must be true."
  tech.desc.forcing_chain.what_to_look_for: "Pick a cell with few candidates. Try each value and propagate. Look for common outcomes."
  tech.desc.nice_loop.what_it_is: "Build a chain of alternating strong and weak links between (cell, digit) pairs. If the chain forms a loop or its endpoints share a digit, eliminations can be derived from the alternating inference chain rules."
  tech.desc.nice_loop.what_to_look_for: "Trace alternating strong/weak links. Check if endpoints share a digit for eliminations."
  tech.desc.x_cycles.what_it_is: "For a single digit, build a chain of alternating strong and weak links. Type 1 (continuous loop) eliminates the digit from cells seeing weak link endpoints. Type 2 places the digit at a strong-strong discontinuity. Type 3 eliminates at a weak-weak discontinuity."
  tech.desc.x_cycles.what_to_look_for: "For each digit, trace alternating strong/weak links and look for cycles or discontinuities."
  tech.desc.three_d_medusa.what_it_is: "Multi-digit coloring: build a graph of (cell, digit) pairs connected by strong links (conjugate pairs and bivalue cells). Color with two alternating colors. Apply six rules to find contradictions or trap eliminations."
  tech.desc.three_d_medusa.what_to_look_for: "Extend single-digit coloring to multiple digits via bivalue cell connections."
  tech.desc.hidden_unique_rectangle.what_it_is: "A deadly rectangle pattern where one or more corners have the UR values hidden among other candidates. Strong links on UR values in shared units force eliminations to avoid the deadly pattern."
  tech.desc.hidden_unique_rectangle.what_to_look_for: "Find a rectangle across two boxes where the UR values are present but hidden by extras."
  tech.desc.avoidable_rectangle.what_it_is: "Like Unique Rectangle but using the distinction between given clues and solver-placed values. If three solver-placed corners of a rectangle have values {A,B}, the fourth unsolved corner cannot complete the deadly pattern."
  tech.desc.avoidable_rectangle.what_to_look_for: "Find rectangles where three corners are solver-placed (not givens) with two values."
  tech.desc.als_xy_wing.what_it_is: "Three non-overlapping Almost Locked Sets linked by restricted commons: A-B linked by X, B-C linked by Y (Y != X). Common value Z in both A and C can be eliminated from cells seeing all Z-cells in both A and C."
  tech.desc.als_xy_wing.what_to_look_for: "Find three ALSs forming a chain with two restricted common candidates."
  tech.desc.death_blossom.what_it_is: "A stem cell with 2-3 candidates, each linked to a petal ALS via restricted common. A value Z common across all petals (but not in the stem) can be eliminated from cells seeing all Z-cells in all petals."
  tech.desc.death_blossom.what_to_look_for: "Find a cell whose candidates each connect to an ALS via restricted common."
  tech.desc.vwxyz_wing.what_it_is: "A five-cell wing pattern: a pivot and four wings collectively contain five candidates. The non-restricted shared value Z can be eliminated from cells seeing all Z-cells."
  tech.desc.vwxyz_wing.what_to_look_for: "Find five cells with exactly five combined candidates and a restricted elimination value."
  tech.desc.franken_fish.what_it_is: "A fish pattern (X-Wing/Swordfish/Jellyfish) where base and cover sets are mixed rows/columns and boxes. At least one base set must be a box. Eliminates from cover cells outside the base."
  tech.desc.franken_fish.what_to_look_for: "Look for fish patterns that include boxes as base or cover sets."
  tech.desc.grouped_x_cycles.what_it_is: "Extends X-Cycles by allowing grouped nodes: 2-3 cells in the same box on the same row or column that all have a candidate digit. Same Type 1/2/3 rules apply."
  tech.desc.grouped_x_cycles.what_to_look_for: "Build X-Cycle chains using grouped box nodes alongside individual cells."
  tech.desc.sashimi_x_wing.what_it_is: "A fish pattern where one base row has only one candidate position instead of two. The missing position is compensated by a fin cell, restricting eliminations to the fin's box."
  tech.desc.sashimi_x_wing.what_to_look_for: "Look for an X-Wing-like pattern where one row is incomplete — it only has the candidate in one of the two expected columns, plus an extra fin cell."
  tech.desc.sashimi_swordfish.what_it_is: "A 3-row fish pattern where at least one base row has fewer candidate positions than expected. The missing position creates a fin that restricts eliminations."
  tech.desc.sashimi_swordfish.what_to_look_for: "Find a Swordfish shape where one row only covers 1 of the 3 base columns, plus a fin."
  tech.desc.sashimi_jellyfish.what_it_is: "A 4-row fish pattern where at least one base row has fewer candidate positions than expected. The missing position creates a fin restricting eliminations."
  tech.desc.sashimi_jellyfish.what_to_look_for: "Find a Jellyfish shape where one row only covers 1 of the 4 base columns, plus a fin."
  tech.desc.unit_forcing_chain.what_it_is: "For a digit in a unit with 2-3 positions, assume the digit goes in each position and propagate. If all branches lead to the same conclusion, that conclusion is true."
  tech.desc.unit_forcing_chain.what_to_look_for: "Find a unit where a digit appears in few cells, then try each placement."
  tech.desc.region_forcing_chain.what_it_is: "For a digit in a box with 2-3 positions, assume the digit goes in each position and propagate. If all branches lead to the same conclusion, that conclusion is true."
  tech.desc.region_forcing_chain.what_to_look_for: "Find a box where a digit appears in few cells, then try each placement."
  tech.desc.mutant_fish.what_it_is: "A fish pattern where BOTH base and cover sets freely mix rows, columns, and boxes. Unlike Franken Fish (one mixed side), Mutant Fish requires both sides to contain at least 2 different unit types. Eliminates from cover cells outside the base."
  tech.desc.mutant_fish.what_to_look_for: "Look for fish patterns where both the base set and cover set mix rows, columns, and boxes."
  tech.desc.kraken_fish.what_it_is: "Extends finned fish by using chain propagation to verify eliminations outside the fin's box. For each candidate that a standard finned fish would reject (outside the fin's box), place the digit at the fin cell and propagate. If the target still loses the candidate, the elimination is valid regardless of whether the fin is true or false."
  tech.desc.kraken_fish.what_to_look_for: "Find a finned fish pattern, then check if chain propagation from the fin cell eliminates the digit from cells outside the fin's box."
  tech.desc.als_chain.what_it_is: "A generalized chain of 4-6 Almost Locked Sets linked by distinct restricted commons. Values common across the chain endpoints can be eliminated from cells that see all relevant ALS members."
  tech.desc.als_chain.what_to_look_for: "Find a chain of ALSs where each adjacent pair shares a restricted common."
  tech.desc.unique_loop.what_it_is: "A deadly pattern where 4-6 cells form a loop, each consecutive pair sharing a unit (row, column, or box). All cells contain the same candidate pair {A,B}. If all cells had only {A,B}, two solutions would exist. Cells with extra candidates must keep them."
  tech.desc.unique_loop.what_to_look_for: "Find a loop of 4-6 cells across at least 2 boxes where each cell has candidates {A,B} and each consecutive pair shares a row, column, or box. If exactly one cell has extras, eliminate A and B from it."
  tech.desc.junior_exocet.what_it_is: "A base pair of cells in a box whose candidates must appear in specific target cells in other boxes along cross-lines. Candidates not matching the base pair pattern can be eliminated from the target cells."
  tech.desc.junior_exocet.what_to_look_for: "Find a base pair in a box with target cells in aligned boxes along cross-lines."
  tech.desc.continuous_nice_loop.what_it_is: "A continuous alternating inference chain (AIC) that forms a complete loop. Every weak link in the loop produces eliminations: the digit can be removed from any cell outside the loop that sees both endpoints of a weak link."
  tech.desc.continuous_nice_loop.what_to_look_for: "Build an AIC where the chain closes back on itself with consistent alternating links. Every weak link segment yields eliminations from external cells seeing both endpoints."
  tech.desc.grouped_nice_loop.what_it_is: "Extends Nice Loop (AIC) with grouped nodes: 2-3 cells in the same box on the same row or column that all share a candidate digit. Combines multi-digit cell-based links (bivalue strong links) with single-digit grouped unit links for stronger chains."
  tech.desc.grouped_nice_loop.what_to_look_for: "Build AIC chains using grouped box nodes alongside individual cells. Look for discontinuous Type 2 chains where both endpoints assert the same digit."
  tech.desc.backtracking.what_it_is: "A brute-force trial-and-error method. Not a logical technique — used as a fallback when no logical strategy can make progress."
  tech.desc.backtracking.what_to_look_for: "This technique is not used in training exercises."
  tech.desc.unknown.what_it_is: "Unknown technique."
  tech.desc.unknown.what_to_look_for: "No identification tips available."

