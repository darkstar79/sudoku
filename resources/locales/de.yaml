  # Trainingshinweise — progressive Hinweistexte
  hint.singles.l1: "Schau dir Zelle {0} an."
  hint.singles.l2_region: "Konzentriere dich auf {0} — zähle die Kandidaten."
  hint.singles.l2_no_region: "Zähle die Kandidaten in Zelle {0}."
  hint.singles.l3: "Der Wert ist {0}."
  hint.subsets.l1_region: "Konzentriere dich auf {0}."
  hint.subsets.l1_no_region: "Suche nach Zellen, die dieselben Kandidaten in einer Einheit teilen."
  hint.subsets.l2_values: "Diese Zellen bilden eine [{0}]-Teilmenge. Die Werte der Teilmenge können nur in diese Zellen — eliminiere sie aus anderen Zellen der Region."
  hint.subsets.l2_no_values: "Diese Zellen bilden die Teilmenge. Die Werte können nur in diese Zellen — eliminiere sie aus anderen Zellen der Region."
  hint.subsets.l3: "Eliminiere Kandidaten aus Zellen, die alle Teilmengenzellen sehen."
  hint.intersections.l1_value: "Suche nach Wert {0}, der auf eine Schnittmenge beschränkt ist."
  hint.intersections.l1_no_value: "Suche nach einem Kandidaten, der auf die Schnittmenge von Box und Linie beschränkt ist."
  hint.intersections.l2: "Die Schnittmengenzellen. Der Kandidat ist auf diese Zellen beschränkt — eliminiere ihn aus anderen Zellen der Linie oder Box außerhalb dieser Schnittmenge."
  hint.intersections.l3: "Eliminiere den Kandidaten aus Zellen außerhalb der Schnittmenge."
  hint.fish.l1_value: "Suche nach einem Fischmuster für Wert {0}."
  hint.fish.l1_no_value: "Suche nach einem Fischmuster (Zeilen/Spalten mit eingeschränkten Kandidatenpositionen)."
  hint.fish.l2: "Basis- und Abdeckungsmengen. Blaue Zellen sind die Basismenge. Grüne Zellen sind die Abdeckungsmenge. Eliminiere den Kandidaten aus Abdeckungszellen, die nicht in der Basismenge sind."
  hint.fish.l3: "Eliminiere den Kandidaten aus Abdeckungszellen außerhalb der Basismenge."
  hint.wings.l1: "Finde die Pivotzelle bei {0}."
  hint.wings.l2: "Pivot- und Flügelzellen. Der orange Pivot verbindet die grünen Flügel. Gemeinsame Kandidaten können aus Zellen eliminiert werden, die alle Flügelendpunkte sehen."
  hint.wings.l3: "Eliminiere den gemeinsamen Kandidaten aus Zellen, die alle Flügelendpunkte sehen."
  hint.single_digit.l1_value: "Suche nach konjugierten Paaren für Wert {0}."
  hint.single_digit.l1_no_value: "Suche nach konjugierten Paaren (Zellen, in denen eine Ziffer genau zweimal in einer Einheit vorkommt)."
  hint.single_digit.l2: "Die Kettenzellen. Diese Zellen bilden konjugierte Paare. Folge dem alternierenden Muster, um Eliminierungen zu finden."
  hint.single_digit.l3: "Zellen, die beide Endpunkte des Musters sehen, können eliminiert werden."
  hint.coloring.l1_value: "Baue eine Färbungskette für Wert {0}."
  hint.coloring.l1_no_value: "Beginne konjugierte Paare mit zwei alternierenden Farben zu färben."
  hint.coloring.l2: "Die Färbungskette. Blau und Grün sind zwei alternierende Farben — eine muss wahr sein, eine falsch. Zellen, die beide Farben sehen, können den Kandidaten eliminieren."
  hint.coloring.l3: "Eine Farbe muss falsch sein — eliminiere aus Zellen, die beide Farben sehen."
  hint.unique_rect.l1: "Suche nach einem tödlichen Muster — vier Zellen, die ein Rechteck über zwei Boxen bilden."
  hint.unique_rect.l2: "Die Rechteckecken. Diese vier Zellen über zwei Boxen bilden ein potenziell tödliches Muster. Um das Rätsel eindeutig zu halten, eliminiere den Kandidaten, der das Rechteck vervollständigen würde."
  hint.unique_rect.l3: "Um das tödliche Muster zu vermeiden, eliminiere den Kandidaten, der es vervollständigen würde."
  hint.chains.l1_pos: "Starte die Kette von Zelle {0}."
  hint.chains.l1_no_pos: "Suche nach einer Kette verknüpfter Zellen mit alternierenden starken/schwachen Verbindungen."
  hint.chains.l2: "Der Kettenpfad. Folge den alternierenden starken (blauen) und schwachen (grünen) Verbindungen. Die Kettenlogik erzwingt eine Schlussfolgerung an den Endpunkten."
  hint.chains.l3_placement: "Alle Ketten führen zu Wert {0} bei {1}."
  hint.chains.l3_elimination: "Eliminiere Kandidaten, die der Kettenlogik widersprechen."
  hint.set_logic.l1: "Suche nach einem Fast Locked Set (eine Gruppe von N Zellen mit N+1 Kandidaten)."
  hint.set_logic.l2: "Die ALS-Zellen und der eingeschränkte Gemeinsame. Ein ALS besteht aus N Zellen mit N+1 Kandidaten. Der eingeschränkte gemeinsame Kandidat verbindet die Mengen — Eliminierungen gelten für Zellen, die alle relevanten ALS-Mitglieder sehen."
  hint.set_logic.l3: "Eliminiere Kandidaten aus Zellen, die alle relevanten ALS-Mitglieder sehen."
  hint.special.l1: "Suche nach der Zelle mit drei Kandidaten (der einzigen Nicht-Biwert-Zelle)."
  hint.special.l2: "Die Schlüsselzelle ist {0}."

  # Technikbeschreibungen — what_it_is und what_to_look_for
  tech.desc.naked_single.what_it_is: "Eine Zelle, in der nur noch ein einziger Kandidat möglich ist."
  tech.desc.naked_single.what_to_look_for: "Suche nach Zellen, die nur einen Kandidaten haben. Dies geschieht, wenn alle anderen Ziffern bereits in derselben Zeile, Spalte oder Box vorkommen."
  tech.desc.hidden_single.what_it_is: "Ein Kandidat, der innerhalb einer Einheit (Zeile, Spalte oder Box) nur in einer einzigen Zelle vorkommen kann."
  tech.desc.hidden_single.what_to_look_for: "Suche in jeder Einheit nach einem Kandidaten, der nur an einer Stelle möglich ist, auch wenn die Zelle mehrere Kandidaten hat."
  tech.desc.naked_pair.what_it_is: "Zwei Zellen in derselben Einheit, die genau dieselben zwei Kandidaten enthalten."
  tech.desc.naked_pair.what_to_look_for: "Suche nach zwei Zellen in einer Einheit, die exakt dasselbe Paar von Kandidaten {A,B} haben. Diese beiden Werte können aus allen anderen Zellen der Einheit eliminiert werden."
  tech.desc.naked_triple.what_it_is: "Drei Zellen in derselben Einheit, deren Kandidaten insgesamt höchstens drei verschiedene Werte umfassen."
  tech.desc.naked_triple.what_to_look_for: "Suche nach drei Zellen in einer Einheit, deren gemeinsame Kandidatenmenge genau drei Werte umfasst. Jede Zelle muss eine Teilmenge dieser drei Werte enthalten."
  tech.desc.hidden_pair.what_it_is: "Zwei Kandidaten, die innerhalb einer Einheit nur in genau zwei Zellen vorkommen."
  tech.desc.hidden_pair.what_to_look_for: "Suche nach zwei Kandidaten, die in einer Einheit auf dieselben zwei Zellen beschränkt sind. Alle anderen Kandidaten können aus diesen beiden Zellen eliminiert werden."
  tech.desc.hidden_triple.what_it_is: "Drei Kandidaten, die innerhalb einer Einheit nur in genau drei Zellen vorkommen."
  tech.desc.hidden_triple.what_to_look_for: "Suche nach drei Kandidaten, die in einer Einheit auf dieselben drei Zellen beschränkt sind. Alle anderen Kandidaten können aus diesen drei Zellen eliminiert werden."
  tech.desc.pointing_pair.what_it_is: "Ein Kandidat in einer Box, der auf eine einzige Zeile oder Spalte beschränkt ist."
  tech.desc.pointing_pair.what_to_look_for: "Wenn ein Kandidat innerhalb einer Box nur in einer Zeile oder Spalte vorkommt, kann er aus den übrigen Zellen dieser Zeile oder Spalte außerhalb der Box eliminiert werden."
  tech.desc.box_line_reduction.what_it_is: "Ein Kandidat in einer Zeile oder Spalte, der auf eine einzige Box beschränkt ist."
  tech.desc.box_line_reduction.what_to_look_for: "Wenn ein Kandidat innerhalb einer Zeile oder Spalte nur in einer Box vorkommt, kann er aus den übrigen Zellen dieser Box eliminiert werden."
  tech.desc.naked_quad.what_it_is: "Vier Zellen in derselben Einheit, deren Kandidaten insgesamt höchstens vier verschiedene Werte umfassen."
  tech.desc.naked_quad.what_to_look_for: "Suche nach vier Zellen in einer Einheit, deren gemeinsame Kandidatenmenge genau vier Werte umfasst. Diese Werte können aus allen anderen Zellen der Einheit eliminiert werden."
  tech.desc.hidden_quad.what_it_is: "Vier Kandidaten, die innerhalb einer Einheit nur in genau vier Zellen vorkommen."
  tech.desc.hidden_quad.what_to_look_for: "Suche nach vier Kandidaten, die in einer Einheit auf dieselben vier Zellen beschränkt sind. Alle anderen Kandidaten können aus diesen vier Zellen eliminiert werden."
  tech.desc.x_wing.what_it_is: "Ein Fisch-Muster, bei dem ein Kandidat in zwei Zeilen jeweils auf genau zwei Spalten beschränkt ist (oder umgekehrt)."
  tech.desc.x_wing.what_to_look_for: "Suche nach einem Kandidaten, der in zwei Zeilen jeweils nur in denselben zwei Spalten vorkommt. Der Kandidat kann aus den übrigen Zellen dieser Spalten eliminiert werden."
  tech.desc.xy_wing.what_it_is: "Drei Biwert-Zellen, die ein Y-Muster bilden: ein Pivot mit {A,B} verbunden mit zwei Flügeln {A,C} und {B,C}."
  tech.desc.xy_wing.what_to_look_for: "Suche nach einer Biwert-Zelle (Pivot), die zwei andere Biwert-Zellen (Flügel) sieht. Wenn die Flügel einen gemeinsamen Kandidaten C teilen, kann C aus Zellen eliminiert werden, die beide Flügel sehen."
  tech.desc.swordfish.what_it_is: "Ein Fisch-Muster der Größe 3: ein Kandidat in drei Zeilen auf höchstens drei Spalten beschränkt (oder umgekehrt)."
  tech.desc.swordfish.what_to_look_for: "Suche nach einem Kandidaten, der in drei Zeilen jeweils nur in denselben drei (oder weniger) Spalten vorkommt. Der Kandidat kann aus den übrigen Zellen dieser Spalten eliminiert werden."
  tech.desc.skyscraper.what_it_is: "Zwei konjugierte Paare desselben Kandidaten, die sich einen Endpunkt teilen."
  tech.desc.skyscraper.what_to_look_for: "Suche nach zwei Zeilen (oder Spalten) mit je genau zwei Positionen für denselben Kandidaten, wobei eine Position geteilt wird. Der Kandidat kann aus Zellen eliminiert werden, die beide nicht geteilten Endpunkte sehen."
  tech.desc.two_string_kite.what_it_is: "Ein Muster aus einem konjugierten Paar in einer Zeile und einem in einer Spalte, verbunden durch eine gemeinsame Box."
  tech.desc.two_string_kite.what_to_look_for: "Suche nach einem Kandidaten mit einem konjugierten Paar in einer Zeile und einem in einer Spalte, die über eine Box verbunden sind. Der Kandidat kann aus der Zelle eliminiert werden, die beide äußeren Endpunkte sieht."
  tech.desc.xyz_wing.what_it_is: "Ein Pivot mit {A,B,C} verbunden mit zwei Flügeln {A,B} und {A,C}."
  tech.desc.xyz_wing.what_to_look_for: "Suche nach einer Zelle mit drei Kandidaten {A,B,C}, die zwei Biwert-Zellen sieht, die jeweils einen Kandidaten mit dem Pivot teilen. Der gemeinsame Kandidat A kann aus Zellen eliminiert werden, die alle drei sehen."
  tech.desc.unique_rectangle.what_it_is: "Vier Zellen, die ein Rechteck über zwei Boxen bilden und ein tödliches Muster erzeugen würden."
  tech.desc.unique_rectangle.what_to_look_for: "Suche nach vier Zellen in einem Rechteck über zwei Boxen mit zwei gemeinsamen Kandidaten. Um die Eindeutigkeit des Rätsels zu bewahren, muss der Kandidat eliminiert werden, der das Muster vervollständigen würde."
  tech.desc.w_wing.what_it_is: "Zwei Biwert-Zellen {A,B}, die durch eine starke Verbindung auf Kandidat A verbunden sind."
  tech.desc.w_wing.what_to_look_for: "Suche nach zwei Biwert-Zellen mit denselben Kandidaten {A,B}, die durch eine starke Verbindung auf einem der Werte verbunden sind. Der andere Wert B kann aus Zellen eliminiert werden, die beide Zellen sehen."
  tech.desc.simple_coloring.what_it_is: "Konjugierte Ketten auf einem einzelnen Kandidaten mit zwei alternierenden Farben."
  tech.desc.simple_coloring.what_to_look_for: "Färbe konjugierte Paare eines Kandidaten mit zwei Farben abwechselnd ein. Wenn zwei gleichfarbige Zellen sich sehen, ist diese Farbe falsch. Zellen, die beide Farben sehen, können den Kandidaten nicht enthalten."
  tech.desc.finned_x_wing.what_it_is: "Ein X-Wing-Muster mit einer zusätzlichen Zelle (Flosse), die das perfekte Muster stört."
  tech.desc.finned_x_wing.what_to_look_for: "Suche nach einem fast perfekten X-Wing, bei dem eine Zeile eine zusätzliche Position hat (die Flosse). Eliminierungen sind auf Zellen beschränkt, die sowohl im Deckungsset als auch in der Box der Flosse liegen."
  tech.desc.remote_pairs.what_it_is: "Eine Kette von Biwert-Zellen mit denselben zwei Kandidaten {A,B}, die sich über mindestens vier Zellen erstreckt."
  tech.desc.remote_pairs.what_to_look_for: "Suche nach einer Kette von Biwert-Zellen mit identischen Kandidaten {A,B}, die sich gegenseitig sehen. Bei gerader Kettenlänge können die beiden Kandidaten aus Zellen eliminiert werden, die beide Endpunkte sehen."
  tech.desc.bug.what_it_is: "BUG (Bivalue Universal Grave): Ein Zustand, in dem alle Zellen Biwert-Zellen wären — bis auf eine."
  tech.desc.bug.what_to_look_for: "Wenn alle leeren Zellen genau zwei Kandidaten haben bis auf eine Zelle mit drei, muss in dieser Zelle der Kandidat platziert werden, der in ihrer Zeile, Spalte und Box dreimal vorkommt."
  tech.desc.jellyfish.what_it_is: "Ein Fisch-Muster der Größe 4: ein Kandidat in vier Zeilen auf höchstens vier Spalten beschränkt (oder umgekehrt)."
  tech.desc.jellyfish.what_to_look_for: "Suche nach einem Kandidaten, der in vier Zeilen jeweils nur in denselben vier (oder weniger) Spalten vorkommt. Der Kandidat kann aus den übrigen Zellen dieser Spalten eliminiert werden."
  tech.desc.finned_swordfish.what_it_is: "Ein Swordfish-Muster mit einer zusätzlichen Flossenposition."
  tech.desc.finned_swordfish.what_to_look_for: "Suche nach einem fast perfekten Swordfish, bei dem eine Basis-Einheit eine zusätzliche Position hat. Eliminierungen sind auf Zellen beschränkt, die sowohl im Deckungsset als auch in der Box der Flosse liegen."
  tech.desc.empty_rectangle.what_it_is: "Ein Muster, bei dem die Positionen eines Kandidaten in einer Box ein leeres Rechteck bilden und eine konjugierte Verbindung nutzen."
  tech.desc.empty_rectangle.what_to_look_for: "Suche nach einer Box, in der ein Kandidat in einer Zeile und einer Spalte vorkommt, aber nicht an deren Schnittpunkt. Kombiniert mit einem konjugierten Paar außerhalb der Box ermöglicht dies eine Eliminierung."
  tech.desc.wxyz_wing.what_it_is: "Ein Wing-Muster mit einem Pivot und drei Flügelzellen, die zusammen vier Kandidaten abdecken."
  tech.desc.wxyz_wing.what_to_look_for: "Suche nach einer Zelle (Pivot) mit Flügeln, deren gemeinsame Kandidatenmenge vier Werte umfasst. Der eingeschränkte gemeinsame Kandidat kann aus Zellen eliminiert werden, die alle vier sehen."
  tech.desc.finned_jellyfish.what_it_is: "Ein Jellyfish-Muster mit einer zusätzlichen Flossenposition."
  tech.desc.finned_jellyfish.what_to_look_for: "Suche nach einem fast perfekten Jellyfish, bei dem eine Basis-Einheit eine zusätzliche Position hat. Eliminierungen sind auf Zellen beschränkt, die sowohl im Deckungsset als auch in der Box der Flosse liegen."
  tech.desc.xy_chain.what_it_is: "Eine Kette von Biwert-Zellen, die durch gemeinsame Kandidaten verknüpft sind."
  tech.desc.xy_chain.what_to_look_for: "Suche nach einer Kette von Biwert-Zellen, bei der jede Zelle einen Kandidaten mit der nächsten teilt. Der Kandidat, der an beiden Endpunkten vorkommt, kann aus Zellen eliminiert werden, die beide Endpunkte sehen."
  tech.desc.multi_coloring.what_it_is: "Mehrere Färbungsketten auf einem Kandidaten, die miteinander interagieren."
  tech.desc.multi_coloring.what_to_look_for: "Erstelle mehrere Färbungscluster auf einem Kandidaten. Wenn eine Farbe eines Clusters beide Farben eines anderen sieht, muss diese Farbe falsch sein. Zellen, die komplementäre Farben verschiedener Cluster sehen, können eliminiert werden."
  tech.desc.als_xz.what_it_is: "Zwei Almost Locked Sets (ALS), verbunden durch einen eingeschränkten gemeinsamen Kandidaten."
  tech.desc.als_xz.what_to_look_for: "Suche nach zwei ALS (je N Zellen mit N+1 Kandidaten), die einen eingeschränkten gemeinsamen Kandidaten X teilen. Ein weiterer gemeinsamer Kandidat Z kann aus Zellen eliminiert werden, die beide ALS sehen."
  tech.desc.sue_de_coq.what_it_is: "Ein Muster am Schnittpunkt einer Zeile/Spalte und einer Box, kombiniert mit Almost Locked Sets."
  tech.desc.sue_de_coq.what_to_look_for: "Suche nach 2-3 Zellen am Schnittpunkt einer Zeile und einer Box, deren Kandidaten mit je einem ALS in der Restzeile und der Restbox abgedeckt werden. Kandidaten können aus den Restzellen eliminiert werden."
  tech.desc.forcing_chain.what_it_is: "Für jeden Kandidaten einer Zelle wird eine Kette verfolgt — alle führen zum selben Ergebnis."
  tech.desc.forcing_chain.what_to_look_for: "Wähle eine Zelle mit wenigen Kandidaten. Verfolge die logischen Konsequenzen jedes Kandidaten. Wenn alle Ketten dasselbe Ergebnis liefern, muss dieses Ergebnis wahr sein."
  tech.desc.nice_loop.what_it_is: "Eine alternierende Schlusskette (AIC), die zwei Zellen durch starke und schwache Verbindungen verknüpft."
  tech.desc.nice_loop.what_to_look_for: "Suche nach einer Kette alternierend starker und schwacher Verbindungen. Wenn die Kette mit zwei starken Verbindungen endet, kann der Endkandidat platziert werden; bei zwei schwachen wird er eliminiert."
  tech.desc.x_cycles.what_it_is: "Zyklische Ketten auf einem einzelnen Kandidaten mit alternierenden starken und schwachen Verbindungen."
  tech.desc.x_cycles.what_to_look_for: "Baue eine Kette auf einem Kandidaten mit alternierenden Verbindungen. Ein geschlossener Zyklus ermöglicht Eliminierungen; bei Diskontinuität wird je nach Typ platziert oder eliminiert."
  tech.desc.three_d_medusa.what_it_is: "Erweiterung der einfachen Färbung auf mehrere Kandidaten innerhalb derselben Zellen."
  tech.desc.three_d_medusa.what_to_look_for: "Färbe konjugierte Paare verschiedener Kandidaten mit zwei Farben ein. Wenn ein Zellen-Kandidat-Paar beiden Farben zugeordnet wird, ist eine Farbe falsch. Nutze die resultierenden Widersprüche für Eliminierungen."
  tech.desc.hidden_unique_rectangle.what_it_is: "Ein Unique Rectangle, bei dem das tödliche Muster durch versteckte Kandidaten aufgedeckt wird."
  tech.desc.hidden_unique_rectangle.what_to_look_for: "Suche nach einem Unique Rectangle, bei dem ein konjugiertes Paar auf einem der Werte bestätigt, dass der andere Wert an einer bestimmten Stelle eliminiert werden muss."
  tech.desc.avoidable_rectangle.what_it_is: "Ein Unique-Rectangle-Muster mit bereits gelösten Zellen, die ein tödliches Muster erzeugen würden."
  tech.desc.avoidable_rectangle.what_to_look_for: "Suche nach einem Rechteck mit zwei gelösten Zellen gleicher Werte und zwei leeren Zellen mit diesen Werten als Kandidaten. Ein Kandidat muss eliminiert werden, um Mehrdeutigkeit zu vermeiden."
  tech.desc.als_xy_wing.what_it_is: "Drei ALS, die paarweise durch eingeschränkte gemeinsame Kandidaten X und Y verbunden sind."
  tech.desc.als_xy_wing.what_to_look_for: "Suche nach drei ALS: {A,B} verbunden durch X und {A,C} verbunden durch Y. Kandidat Z, der in A und C vorkommt, kann aus Zellen eliminiert werden, die die Z-Zellen beider ALS sehen."
  tech.desc.death_blossom.what_it_is: "Eine Stammzelle, deren Kandidaten jeweils auf ein eigenes ALS (Blütenblatt) zeigen."
  tech.desc.death_blossom.what_to_look_for: "Suche nach einer Zelle (Stamm), bei der jeder Kandidat über einen eingeschränkten Gemeinsamen mit einem eigenen ALS verbunden ist. Gemeinsame Kandidaten der Blütenblätter können aus Zellen eliminiert werden, die alle sehen."
  tech.desc.vwxyz_wing.what_it_is: "Ein Wing-Muster mit einem Pivot und vier Flügelzellen, die zusammen fünf Kandidaten abdecken."
  tech.desc.vwxyz_wing.what_to_look_for: "Suche nach einer Zelle (Pivot) mit Flügeln, deren gemeinsame Kandidatenmenge fünf Werte umfasst. Der eingeschränkte gemeinsame Kandidat kann aus Zellen eliminiert werden, die alle Z-Zellen sehen."
  tech.desc.franken_fish.what_it_is: "Ein Fisch-Muster, bei dem die Basismengen aus Zeilen/Spalten und Boxen gemischt bestehen."
  tech.desc.franken_fish.what_to_look_for: "Suche nach einem Fisch, dessen Basis- und Deckungsmengen Zeilen/Spalten mit Boxen kombinieren. Der Kandidat kann aus Deckungszellen außerhalb der Basismenge eliminiert werden."
  tech.desc.grouped_x_cycles.what_it_is: "X-Cycles mit gruppierten Knoten, bei denen mehrere Zellen in einer Box als einzelner Knoten behandelt werden."
  tech.desc.grouped_x_cycles.what_to_look_for: "Wie X-Cycles, aber Gruppen von Zellen innerhalb einer Box werden als ein Knoten zusammengefasst. Dies ermöglicht komplexere Kettenmuster und zusätzliche Eliminierungen."
  tech.desc.sashimi_x_wing.what_it_is: "Ein Finned X-Wing, bei dem eine Basisposition fehlt — die Flosse ist der einzige Überrest."
  tech.desc.sashimi_x_wing.what_to_look_for: "Suche nach einem fast vollständigen X-Wing, bei dem eine erwartete Position fehlt und durch eine Flosse ersetzt wird. Eliminierungen gelten für Zellen in der Box der Flosse, die auch im Deckungsset liegen."
  tech.desc.sashimi_swordfish.what_it_is: "Ein Finned Swordfish, bei dem eine Basisposition fehlt — die Flosse kompensiert die Lücke."
  tech.desc.sashimi_swordfish.what_to_look_for: "Suche nach einem fast vollständigen Swordfish mit fehlender Basisposition und einer Flosse. Eliminierungen sind auf die Schnittmenge von Flossenbox und Deckungsset beschränkt."
  tech.desc.sashimi_jellyfish.what_it_is: "Ein Finned Jellyfish, bei dem eine Basisposition fehlt — die Flosse kompensiert die Lücke."
  tech.desc.sashimi_jellyfish.what_to_look_for: "Suche nach einem fast vollständigen Jellyfish mit fehlender Basisposition und einer Flosse. Eliminierungen sind auf die Schnittmenge von Flossenbox und Deckungsset beschränkt."
  tech.desc.unit_forcing_chain.what_it_is: "Alle Positionen eines Kandidaten in einer Einheit werden als Startpunkte verfolgt — alle führen zum selben Ergebnis."
  tech.desc.unit_forcing_chain.what_to_look_for: "Wähle eine Einheit (Zeile, Spalte oder Box) mit wenigen Positionen für einen Kandidaten. Wenn das Setzen des Kandidaten an jeder Position zum selben Ergebnis führt, muss dieses wahr sein."
  tech.desc.region_forcing_chain.what_it_is: "Alle Positionen eines Kandidaten in einer Region werden verfolgt — alle Ketten konvergieren."
  tech.desc.region_forcing_chain.what_to_look_for: "Ähnlich wie Unit Forcing Chain, aber der Fokus liegt auf einer Region. Wenn jede mögliche Platzierung eines Kandidaten dasselbe Ergebnis erzwingt, ist das Ergebnis gesichert."
  tech.desc.mutant_fish.what_it_is: "Ein Fisch-Muster mit völlig gemischten Basis- und Deckungsmengen aus Zeilen, Spalten und Boxen."
  tech.desc.mutant_fish.what_to_look_for: "Suche nach einem Fisch, dessen Basis- und Deckungsmengen beliebig aus Zeilen, Spalten und Boxen zusammengesetzt sind. Kandidaten werden aus Deckungszellen eliminiert, die nicht zur Basismenge gehören."
  tech.desc.kraken_fish.what_it_is: "Ein Finned Fish, bei dem die Flosse durch Forcing Chains verifiziert wird."
  tech.desc.kraken_fish.what_to_look_for: "Suche nach einem Finned Fish, bei dem die Eliminierungen durch Ketten von der Flosse aus bestätigt werden. Die Ketten beweisen, dass die Eliminierung unabhängig von der Flosse gültig ist."
  tech.desc.als_chain.what_it_is: "Eine Kette von ALS, die paarweise durch eingeschränkte gemeinsame Kandidaten verbunden sind."
  tech.desc.als_chain.what_to_look_for: "Suche nach einer Folge von ALS, bei denen benachbarte Paare eingeschränkte gemeinsame Kandidaten teilen. Kandidaten des ersten und letzten ALS können aus Zellen eliminiert werden, die die Z-Zellen beider sehen."
  tech.desc.unique_loop.what_it_is: "Eine Schleife von Zellen mit zwei gemeinsamen Kandidaten, die ein erweitertes tödliches Muster bilden."
  tech.desc.unique_loop.what_to_look_for: "Suche nach einer geschlossenen Schleife von Zellen mit zwei gemeinsamen Kandidaten, wobei jede Zelle die nächste in der Kette sieht. Zusätzliche Kandidaten müssen vorhanden sein, um die Eindeutigkeit zu gewährleisten."
  tech.desc.junior_exocet.what_it_is: "Ein Muster mit zwei Basiszellen und zwei Zielzellen, die durch Kandidatenbeschränkungen verknüpft sind."
  tech.desc.junior_exocet.what_to_look_for: "Suche nach zwei Basiszellen in einer Zeile mit Zielzellen in verschiedenen Boxen. Die Zielzellen können nur die Kandidaten der Basiszellen enthalten — alle anderen werden eliminiert."
  tech.desc.continuous_nice_loop.what_it_is: "Eine geschlossene alternierende Schlusskette, bei der die Schleife zu sich selbst zurückkehrt."
  tech.desc.continuous_nice_loop.what_to_look_for: "Suche nach einer geschlossenen Kette alternierend starker und schwacher Verbindungen. Schwache Verbindungen innerhalb der Schleife ermöglichen die Eliminierung der verbundenen Kandidaten aus externen Zellen."
  tech.desc.grouped_nice_loop.what_it_is: "Ein Nice Loop mit gruppierten Knoten, bei dem mehrere Zellen einer Box als ein Knoten gelten."
  tech.desc.grouped_nice_loop.what_to_look_for: "Wie ein Nice Loop, aber Zellgruppen innerhalb einer Box fungieren als einzelner Knoten. Dies ermöglicht die Erkennung komplexerer Muster und zusätzliche Eliminierungen."
  tech.desc.backtracking.what_it_is: "Systematisches Ausprobieren von Kandidaten mit Zurücksetzen bei Widersprüchen."
  tech.desc.backtracking.what_to_look_for: "Backtracking ist keine logische Technik. Es wird als letztes Mittel eingesetzt, wenn keine logischen Strategien mehr anwendbar sind."
  tech.desc.unknown.what_it_is: "Unbekannte Lösungstechnik."
  tech.desc.unknown.what_to_look_for: "Keine Beschreibung verfügbar."

