app-id: io.github.darkstar79.Sudoku
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: sudoku

finish-args:
  # Required when XWayland fallback is in use (Qt shares an X11 IPC connection)
  - --share=ipc
  # XWayland fallback for X11-only sessions; no-op on pure-Wayland desktops
  - --socket=fallback-x11
  # Native Wayland surface (preferred path on modern desktops)
  - --socket=wayland
  # GPU access for Qt's accelerated rendering
  - --device=dri
# Sandbox notes:
# - No --filesystem=* entries: saves live inside the sandbox at
#   ~/.var/app/io.github.darkstar79.Sudoku/data/ (does NOT migrate from the
#   non-Flatpak path ~/.local/share/sudoku/saves/).
# - No --talk-name=* entries: no D-Bus access; the app is fully self-contained.

modules:
  # spdlog (header-only mode with fmt bundled)
  - name: spdlog
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSPDLOG_BUILD_SHARED=OFF
      - -DSPDLOG_BUILD_EXAMPLE=OFF
      - -DSPDLOG_BUILD_TESTS=OFF
      - -DSPDLOG_FMT_EXTERNAL=OFF
    sources:
      - type: archive
        url: https://github.com/gabime/spdlog/archive/refs/tags/v1.15.3.tar.gz
        sha256: 15a04e69c222eb6c01094b5c7ff8a249b36bb22788d72519646fb85feb267e67

  # yaml-cpp (0.9.0 for GCC 15 compatibility)
  - name: yaml-cpp
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DYAML_BUILD_SHARED_LIBS=OFF
      - -DYAML_CPP_BUILD_TESTS=OFF
      - -DYAML_CPP_BUILD_TOOLS=OFF
    sources:
      - type: archive
        url: https://github.com/jbeder/yaml-cpp/archive/refs/tags/yaml-cpp-0.9.0.tar.gz
        sha256: 25cb043240f828a8c51beb830569634bc7ac603978e0f69d6b63558dadefd49a

  # libsodium
  - name: libsodium
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/jedisct1/libsodium/releases/download/1.0.21-RELEASE/libsodium-1.0.21.tar.gz
        sha256: 9e4285c7a419e82dedb0be63a72eea357d6943bc3e28e6735bf600dd4883feaf

  # sudoku (the application)
  - name: sudoku
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      # Local development: builds the working copy from the parent directory.
      - type: dir
        path: ..
      # Flathub submission: comment out the `type: dir` above and uncomment
      # this block. Bump `tag` + `commit` on each release. Flathub's buildbot
      # rejects `type: dir` because it requires immutable, reproducible refs.
      # - type: git
      #   url: https://github.com/darkstar79/sudoku.git
      #   tag: v1.0.0
      #   commit: <fill with `git rev-parse v1.0.0` after tagging>
