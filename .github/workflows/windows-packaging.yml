name: Windows Packaging

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  installer:
    name: NSIS Installer
    runs-on: windows-2025

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: win64_msvc2022_64

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect

      - name: Install NSIS
        run: choco install nsis -y

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-windows-release-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-windows-release-

      - name: Install dependencies
        run: conan install . --build=missing --output-folder=build/Release

      - name: Configure CMake
        env:
          QT6_DIR: ${{ env.Qt6_DIR }}/..
        run: |
          call build\Release\generators\conanbuild.bat
          cmake -S . -B build/Release ^
            -DCMAKE_TOOLCHAIN_FILE=build/Release/generators/conan_toolchain.cmake ^
            -DCMAKE_BUILD_TYPE=Release ^
            "-DCMAKE_PREFIX_PATH=%Qt6_DIR%/.."
        shell: cmd

      - name: Build
        run: cmake --build build/Release --config Release

      - name: Package installer
        env:
          QT6_DIR: ${{ env.Qt6_DIR }}/..
        run: cpack --config build/Release/CPackConfig.cmake -G NSIS -C Release -B build/Release

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: build/Release/Sudoku-*-win64.exe
          retention-days: 90

  release:
    name: Upload Release Assets
    runs-on: ubuntu-24.04
    needs: [installer]
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Sudoku-*-win64.exe
