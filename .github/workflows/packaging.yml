name: Packaging

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  # VERSION is the raw ref name; tags (v1.0.0) are filename-safe but
  # branch names like feature/release-1.0-prep contain '/'. Steps that
  # embed VERSION into output paths sanitize it with bash parameter
  # expansion, but the leading-'v' strip is applied ONLY for real tag
  # refs (REF_TYPE == 'tag'); on a branch/dispatch the name is kept as-is
  # so a branch like 'version-bump' is not corrupted into 'ersion-bump':
  #   if [ "$REF_TYPE" = tag ]; then version_safe="${VERSION#v}"; else version_safe="$VERSION"; fi
  #   version_safe="${version_safe//\//-}"
  # so a tag v1.0.0 yields the artifact-name version 1.0.0 — one identical
  # string across Flatpak/AppImage/DMG and CPack's NSIS name
  # (Sudoku-${PROJECT_VERSION}-win64, CMakeLists.txt). GHA expressions have
  # no replace() function, so the substitution has to happen in shell.
  VERSION: ${{ github.ref_name || 'dev' }}

jobs:
  release-guard:
    name: Release Guard (version integrity)
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify tag ↔ version ↔ metainfo consistency
        env:
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # On a tag push, run in tag mode (asserts tag == v<PROJECT_VERSION> and a fresh
          # metainfo release date); on any other trigger (workflow_dispatch from a branch)
          # run consistency-only mode. A mismatch fails here, before any artifact is built.
          if [[ "$REF" == refs/tags/* ]]; then
            ./scripts/check_release_consistency.sh "$REF_NAME"
          else
            ./scripts/check_release_consistency.sh
          fi

  flatpak:
    name: Flatpak Bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: release-guard

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Flatpak and SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.kde.Platform//6.10 org.kde.Sdk//6.10

      - name: Build Flatpak
        run: |
          flatpak-builder --user --force-clean --repo=repo \
            build-flatpak flatpak/io.github.darkstar79.Sudoku.yml

      - name: Create Flatpak bundle
        env:
          REF_TYPE: ${{ github.ref_type }}
        run: |
          # Strip a leading 'v' only for real tag refs, so a branch/dispatch name is never corrupted.
          if [ "$REF_TYPE" = "tag" ]; then version_safe="${VERSION#v}"; else version_safe="$VERSION"; fi
          version_safe="${version_safe//\//-}"
          flatpak build-bundle repo \
            "Sudoku-${version_safe}-x86_64.flatpak" \
            io.github.darkstar79.Sudoku

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v7
        with:
          name: flatpak-bundle
          path: Sudoku-*.flatpak
          retention-days: 90

  appimage:
    name: AppImage
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: release-guard

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev qt6-tools-dev qt6-tools-dev-tools libgl1-mesa-dev \
            ninja-build ccache \
            libfuse2

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-linux-release-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-linux-release-

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=Release -o with_tests=False

      - name: Build Release
        run: |
          source build/Release/generators/conanbuild.sh
          cmake --preset release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build --preset release

      - name: Install to AppDir
        run: |
          DESTDIR=${{ github.workspace }}/AppDir cmake --install build/Release

      - name: Download linuxdeploy
        run: |
          curl -sL -o linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -sL -o linuxdeploy-plugin-qt-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-*.AppImage

      - name: Create AppImage
        env:
          REF_TYPE: ${{ github.ref_type }}
        run: |
          # Strip a leading 'v' only for real tag refs, so a branch/dispatch name is never corrupted.
          if [ "$REF_TYPE" = "tag" ]; then version_safe="${VERSION#v}"; else version_safe="$VERSION"; fi
          version_safe="${version_safe//\//-}"
          export LDAI_OUTPUT="Sudoku-${version_safe}-x86_64.AppImage"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: appimage
          path: Sudoku-*.AppImage
          retention-days: 90

  installer:
    name: NSIS Installer
    runs-on: windows-2025
    timeout-minutes: 30
    needs: release-guard

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: win64_msvc2022_64

      - name: Set QT6_DIR
        run: echo "QT6_DIR=$QT_ROOT_DIR" >> "$GITHUB_ENV"
        shell: bash

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      - name: Install NSIS
        run: choco install nsis -y

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-windows-release-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-windows-release-

      - name: Install dependencies
        run: conan install . --build=missing --output-folder=build/Release -o with_tests=False

      - name: Configure CMake
        run: |
          call build\Release\generators\conanbuild.bat
          cmake -S . -B build/Release ^
            -G Ninja ^
            -DCMAKE_TOOLCHAIN_FILE=build/Release/generators/conan_toolchain.cmake ^
            -DCMAKE_BUILD_TYPE=Release ^
            "-DCMAKE_PREFIX_PATH=%QT6_DIR%"
        shell: cmd

      - name: Build
        run: cmake --build build/Release --config Release

      - name: Package installer
        run: cpack --config build/Release/CPackConfig.cmake -G NSIS -C Release -B build/Release

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: build/Release/Sudoku-*-win64.exe
          retention-days: 90

  dmg:
    name: macOS DMG (Universal Binary)
    runs-on: macos-15
    timeout-minutes: 45
    needs: release-guard
    # macOS is out of scope for 1.0.0: there is no Apple Developer account, so
    # the DMG cannot be code-signed/notarized and would only ship as an unsigned
    # (Gatekeeper-hostile) image. Build it on demand only, and keep it OUT of the
    # `release` job's `needs` so it never gates a tagged release.
    # NOTE: the universal build below still needs work before it can be relied on
    # — conanfile.py's layout() hardcodes build/Release/generators, so the
    # per-arch `--output-folder=build/{arm64,x86_64}` does not place the Conan
    # toolchain where the configure step looks for it. Fix that first.
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Qt6 and Ninja
        run: brew install qt ninja

      - name: Set QT6_DIR
        run: echo "QT6_DIR=$(brew --prefix qt)/lib/cmake/Qt6" >> "$GITHUB_ENV"

      - name: Install Conan
        run: pip install conan

      - name: Auto-detect Conan profile
        run: conan profile detect --force

      - name: Cache Conan packages (arm64)
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-macos-arm64-release-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-macos-arm64-release-

      - name: Install Conan deps (arm64)
        run: |
          conan install . --build=missing \
            -s build_type=Release -s compiler.cppstd=23 \
            -s os.version=13.0 -s arch=armv8 \
            -o with_tests=False \
            --output-folder=build/arm64

      - name: Install Conan deps (x86_64)
        run: |
          conan install . --build=missing \
            -s build_type=Release -s compiler.cppstd=23 \
            -s os.version=13.0 -s arch=x86_64 \
            -o with_tests=False \
            --output-folder=build/x86_64

      - name: Build arm64
        run: |
          cmake -S . -B build/arm64 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=build/arm64/generators/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            "-DCMAKE_PREFIX_PATH=$QT6_DIR"
          cmake --build build/arm64

      - name: Build x86_64
        run: |
          cmake -S . -B build/x86_64 \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=build/x86_64/generators/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            "-DCMAKE_PREFIX_PATH=$QT6_DIR"
          cmake --build build/x86_64

      - name: Create Universal Binary
        run: |
          cp -R build/arm64/bin/sudoku.app build/sudoku_universal.app
          lipo -create \
            build/arm64/bin/sudoku.app/Contents/MacOS/sudoku \
            build/x86_64/bin/sudoku.app/Contents/MacOS/sudoku \
            -output build/sudoku_universal.app/Contents/MacOS/sudoku
          lipo -info build/sudoku_universal.app/Contents/MacOS/sudoku

      - name: Deploy Qt frameworks (macdeployqt)
        run: |
          "$(brew --prefix qt)/bin/macdeployqt" build/sudoku_universal.app

      - name: Create DMG
        env:
          REF_TYPE: ${{ github.ref_type }}
        run: |
          # Strip a leading 'v' only for real tag refs, so a branch/dispatch name is never corrupted.
          if [ "$REF_TYPE" = "tag" ]; then version_safe="${VERSION#v}"; else version_safe="$VERSION"; fi
          version_safe="${version_safe//\//-}"
          mkdir -p dist
          cp -R build/sudoku_universal.app dist/
          hdiutil create -volname "Sudoku" \
            -srcfolder dist \
            -ov -format UDBZ \
            "Sudoku-${version_safe}-macOS.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: Sudoku-*-macOS.dmg
          retention-days: 90

  release:
    name: Upload Release Assets
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    # macOS DMG intentionally excluded — it is gated to workflow_dispatch only
    # (see the dmg job) and is not part of a tagged release.
    needs: [flatpak, appimage, installer]
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Pre-release tags carry a hyphen (e.g. v1.0.0-rc1); final tags
          # (v1.0.0) do not. Mark RCs as pre-release and keep them off "latest".
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
          files: |
            Sudoku-*.flatpak
            Sudoku-*.AppImage
            Sudoku-*-win64.exe
