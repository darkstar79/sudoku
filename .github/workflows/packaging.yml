name: Packaging

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  VERSION: ${{ github.ref_name || 'dev' }}

jobs:
  flatpak:
    name: Flatpak Bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Flatpak and SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.kde.Platform//6.8 org.kde.Sdk//6.8

      - name: Build Flatpak
        run: |
          flatpak-builder --user --force-clean --repo=repo \
            build-flatpak flatpak/org.sudoku_cpp.Sudoku.yml

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle repo \
            Sudoku-${{ env.VERSION }}-x86_64.flatpak \
            org.sudoku_cpp.Sudoku

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v7
        with:
          name: flatpak-bundle
          path: Sudoku-*.flatpak
          retention-days: 90

  appimage:
    name: AppImage
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev libgl1-mesa-dev \
            libsodium-dev libyaml-cpp-dev libspdlog-dev libfmt-dev \
            zlib1g-dev \
            ninja-build ccache \
            libfuse2

      - name: Build Release
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build

      - name: Install to AppDir
        run: |
          DESTDIR=${{ github.workspace }}/AppDir cmake --install build

      - name: Download linuxdeploy
        run: |
          curl -sL -o linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -sL -o linuxdeploy-plugin-qt-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-*.AppImage

      - name: Create AppImage
        env:
          LDAI_OUTPUT: Sudoku-${{ env.VERSION }}-x86_64.AppImage
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: appimage
          path: Sudoku-*.AppImage
          retention-days: 90

  installer:
    name: NSIS Installer
    runs-on: windows-2025
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: win64_msvc2022_64

      - name: Compute QT6_DIR
        run: |
          import os, pathlib
          qt_root = str(pathlib.Path(os.environ["Qt6_DIR"]).parents[2])
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"QT6_DIR={qt_root}\n")
        shell: python

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      - name: Install NSIS
        run: choco install nsis -y

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-windows-release-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-windows-release-

      - name: Install dependencies
        run: conan install . --build=missing --output-folder=build/Release

      - name: Configure CMake
        run: |
          call build\Release\generators\conanbuild.bat
          cmake -S . -B build/Release ^
            -G Ninja ^
            -DCMAKE_TOOLCHAIN_FILE=build/Release/generators/conan_toolchain.cmake ^
            -DCMAKE_BUILD_TYPE=Release ^
            "-DCMAKE_PREFIX_PATH=%QT6_DIR%"
        shell: cmd

      - name: Build
        run: cmake --build build/Release --config Release

      - name: Package installer
        run: cpack --config build/Release/CPackConfig.cmake -G NSIS -C Release -B build/Release

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: build/Release/Sudoku-*-win64.exe
          retention-days: 90

  release:
    name: Upload Release Assets
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    needs: [flatpak, appimage, installer]
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Sudoku-*.flatpak
            Sudoku-*.AppImage
            Sudoku-*-win64.exe
