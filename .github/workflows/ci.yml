name: CI

on:
  push:
    branches: [ main, develop, 'feature/**', 'ci/**' ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  format-check:
    name: Code Formatting
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check code formatting
        run: |
          echo "Checking code formatting with clang-format..."
          ./scripts/format.sh check
          if [ $? -ne 0 ]; then
            echo "❌ Code formatting check failed!"
            echo "Run './scripts/format.sh' to fix formatting issues"
            exit 1
          fi
          echo "✅ Code formatting check passed"

  i18n-check:
    name: Translation Completeness
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify translations are in sync with source
        run: |
          echo "Scanning source for core::loc / core::locFormat calls and"
          echo "comparing against resources/translations/sudoku_*.ts ..."
          python3 scripts/check_translations.py
          echo "✅ Translation check passed"

  test-and-coverage:
    name: Test & Coverage
    runs-on: ubuntu-24.04
    needs: format-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies
        uses: ./.github/actions/install-qt-deps

      - name: Install Conan and gcovr
        run: |
          pip3 install conan gcovr
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-relwithdebinfo-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-relwithdebinfo-

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=RelWithDebInfo

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-relwithdebinfo-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-relwithdebinfo-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Build, test, and generate coverage report
        run: |
          ./scripts/coverage.sh xml
          echo "✅ Build, tests, and coverage report complete"

      - name: Show ccache stats
        run: ccache --show-stats

      - name: Enforce coverage threshold
        run: |
          echo "Checking coverage thresholds..."
          gcovr --config .gcovr.cfg
          echo "✅ Coverage thresholds met"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage_report.html
          retention-days: 30
