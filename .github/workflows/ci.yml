name: CI

on:
  push:
    # Branch-prefix allowlist for direct pushes. PRs into main/develop run via the
    # pull_request trigger below regardless of head-branch name, so prefixes here
    # only affect ad-hoc pushes (catching regressions before a PR is opened).
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
      - 'bugfix/**'
      - 'hotfix/**'
      - 'refactor/**'
      - 'chore/**'
      - 'ci/**'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

# Avoid running the same workflow twice on the same commit when a branch
# is both pushed and has an open PR. Group by PR number when available,
# otherwise by ref, so the push-triggered run is cancelled as soon as the
# pull_request-triggered run starts on the same head.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Code Formatting
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          pip install 'clang-format==22.1.5'

      - name: Check code formatting
        run: |
          echo "Checking code formatting with clang-format..."
          ./scripts/format.sh check
          if [ $? -ne 0 ]; then
            echo "❌ Code formatting check failed!"
            echo "Run './scripts/format.sh' to fix formatting issues"
            exit 1
          fi
          echo "✅ Code formatting check passed"

  i18n-check:
    name: Translation Completeness
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies
        uses: ./.github/actions/install-qt-deps

      - name: Install Conan
        run: |
          pip3 install conan
          conan profile detect --force

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=Release

      - name: Configure CMake
        run: cmake --preset release

      - name: Run lupdate and check for drift
        run: |
          cmake --build --preset release --target sudoku_lupdate
          if ! git diff --exit-code resources/translations/; then
            echo "❌ Translation drift detected."
            echo "Run 'cmake --build build/Release --target sudoku_lupdate' locally,"
            echo "translate any new <translation type=\"unfinished\"> entries"
            echo "using Qt Linguist, and commit."
            exit 1
          fi
          # Check every non-English locale for unfinished entries.
          # English is the source language — its entries are always 'unfinished'
          # and Qt's QTranslator falls back to the <source> text.
          fail=0
          for ts in resources/translations/sudoku_*.ts; do
            [ "$ts" = "resources/translations/sudoku_en.ts" ] && continue
            if grep -q 'type="unfinished"' "$ts"; then
              echo "❌ $ts has unfinished translations:"
              grep 'type="unfinished"' "$ts" | head
              fail=1
            fi
          done
          [ "$fail" -eq 1 ] && exit 1
          echo "✅ Translations are in sync and complete"

      - name: Validate fmt-style placeholders in translations
        run: |
          # Catch translator-introduced placeholder mismatches (e.g. dropping
          # {0} from a "Score: {0}" source) that lupdate does not validate.
          # See scripts/check_translation_placeholders.py for the rules.
          python3 scripts/check_translation_placeholders.py
          python3 scripts/tests/test_check_translation_placeholders.py

  test-and-coverage:
    name: Test & Coverage
    runs-on: ubuntu-24.04
    needs: format-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies
        uses: ./.github/actions/install-qt-deps

      - name: Install Conan and gcovr
        run: |
          pip3 install conan gcovr
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-relwithdebinfo-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-relwithdebinfo-

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=RelWithDebInfo

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-relwithdebinfo-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-relwithdebinfo-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Build, test, and generate coverage report
        run: |
          ./scripts/coverage.sh xml
          echo "✅ Build, tests, and coverage report complete"

      - name: Show ccache stats
        run: ccache --show-stats

      - name: Enforce coverage threshold
        run: |
          echo "Checking coverage thresholds..."
          gcovr --config .gcovr.cfg
          echo "✅ Coverage thresholds met"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage_report.html
          retention-days: 30

  clang-tidy-diff:
    name: clang-tidy (diff)
    runs-on: ubuntu-24.04
    needs: format-check
    # Skip on pushes to main: there's no meaningful diff base (already merged).
    # Nightly's full clang-tidy is the safety net for the trunk.
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Need history back to the merge base so `git diff` can compute the range.
          fetch-depth: 0

      - name: Install system dependencies
        uses: ./.github/actions/install-qt-deps

      - name: Install clang-tidy
        run: |
          if sudo apt-get install -y clang-tidy-19; then
            sudo ln -sf /usr/bin/clang-tidy-19 /usr/local/bin/clang-tidy
          else
            sudo apt-get install -y clang-tidy
          fi
          # clang-tidy-diff.py ships with the LLVM packages but is not on PATH.
          tidy_diff="$(dpkg -L clang-tidy-19 2>/dev/null | grep -E 'clang-tidy-diff\.py$' | head -n1)"
          if [ -z "$tidy_diff" ]; then
            tidy_diff="$(dpkg -L clang-tidy 2>/dev/null | grep -E 'clang-tidy-diff\.py$' | head -n1)"
          fi
          if [ -z "$tidy_diff" ] || [ ! -f "$tidy_diff" ]; then
            echo "::error::clang-tidy-diff.py not found in clang-tidy package"
            exit 1
          fi
          sudo install -m 0755 "$tidy_diff" /usr/local/bin/clang-tidy-diff.py

      - name: Install Conan
        run: |
          pip3 install conan
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-relwithdebinfo-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-relwithdebinfo-

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-relwithdebinfo-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-relwithdebinfo-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=RelWithDebInfo -s compiler.cppstd=gnu23

      - name: Build
        # Full build is required so generated headers (moc_*, qrc_*, version.h,
        # translation outputs) exist and compile_commands.json is populated.
        # ccache makes incremental runs cheap.
        run: |
          cmake --preset relwithdebinfo
          cmake --build --preset relwithdebinfo

      - name: Show ccache stats
        run: ccache --show-stats

      - name: Determine diff base
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            git fetch --no-tags --depth=50 origin main || true
            BASE="$(git merge-base origin/main HEAD 2>/dev/null || echo HEAD~1)"
          fi
          echo "Diff base: $BASE"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Run clang-tidy on changed lines
        # `-p1` strips the leading `a/` from diff paths; `-path` points at the
        # build dir holding compile_commands.json; `-warnings-as-errors='*'`
        # matches the nightly full-tree run so PRs see the same gate.
        run: |
          set -o pipefail
          git diff -U0 "${{ steps.range.outputs.base }}" -- \
              'src/*.cpp' 'src/*.h' 'src/**/*.cpp' 'src/**/*.h' \
              'tests/*.cpp' 'tests/*.h' 'tests/**/*.cpp' 'tests/**/*.h' \
            | tee /tmp/changes.diff \
            | clang-tidy-diff.py \
                -p1 \
                -path build/RelWithDebInfo \
                -clang-tidy-binary clang-tidy \
                -config-file .clang-tidy \
                -warnings-as-errors='*' \
                -j "$(nproc)" \
                -use-color

  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-2025
    needs: format-check
    # On-demand only — Windows runner minutes are expensive and the primary
    # dev environment is Linux. Trigger manually via workflow_dispatch.
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: win64_msvc2022_64

      - name: Set QT6_DIR
        run: echo "QT6_DIR=$QT_ROOT_DIR" >> "$GITHUB_ENV"
        shell: bash

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-windows-release-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-windows-release-

      - name: Install dependencies
        # Force Catch2 to be built at C++17 so its StringMaker<string_view>
        # specialization is emitted into the .lib (gated by _MSVC_LANG>=201703
        # in catch_tostring.cpp). `conan profile detect --force` defaults MSVC
        # to cppstd=14, which omits the symbol and breaks linking of any
        # REQUIRE that captures a std::string_view (e.g. IStrategy::getName()).
        run: conan install . --build=missing --output-folder=build/Release -s build_type=Release -s "catch2/*:compiler.cppstd=17"
        shell: cmd

      - name: Configure CMake
        run: |
          call build\Release\generators\conanbuild.bat
          cmake -S . -B build/Release ^
            -G Ninja ^
            -DCMAKE_TOOLCHAIN_FILE=build/Release/generators/conan_toolchain.cmake ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DSUDOKU_ENABLE_UI_TESTS=ON ^
            "-DCMAKE_PREFIX_PATH=%QT6_DIR%"
        shell: cmd

      - name: Build
        run: cmake --build build/Release --config Release

      - name: Run unit tests
        run: build\Release\bin\tests\unit_tests.exe
        shell: cmd

      - name: Run integration tests
        run: build\Release\bin\tests\integration_tests.exe
        shell: cmd

      - name: Run UI tests (offscreen)
        # UI tests register themselves via add_test() with the
        # QT_QPA_PLATFORM=offscreen environment already set per-test in
        # tests/ui/CMakeLists.txt. The "^test_" regex matches only the UI
        # tests (unit_tests / integration_tests don't share that prefix).
        run: ctest --test-dir build/Release -R "^test_" --output-on-failure
        shell: cmd

      - name: Re-run failed UI tests with QTest file logger
        # QTest's stdout logger is buffered on Windows and gets dropped
        # when a slot fails via QVERIFY (the process exits via abort()),
        # so ctest --verbose only shows the unbuffered spdlog lines and
        # hides the actual assertion. Re-invoke each failed binary
        # directly with `-o file,txt` so QTest flushes to disk, then
        # dump the file. LastTestsFailed.log holds the failing test
        # names in `<index>:<name>` form.
        if: failure()
        run: |
          if not exist build\Release\Testing\Temporary\LastTestsFailed.log (
            echo No LastTestsFailed.log — nothing to re-run.
            exit /b 0
          )
          for /f "usebackq tokens=2 delims=:" %%n in (`type build\Release\Testing\Temporary\LastTestsFailed.log`) do (
            echo === QTest output for %%n ===
            build\Release\bin\tests\ui\%%n.exe -o qtest_%%n.txt,txt -v2 || ver > nul
            if exist qtest_%%n.txt type qtest_%%n.txt
          )
        shell: cmd
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Upload QTest output files on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qtest-windows-output
          path: qtest_*.txt
          if-no-files-found: ignore

      - name: Upload CTest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-windows-log
          path: build/Release/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-15
    needs: format-check
    # On-demand only — macOS runner minutes are expensive and the primary
    # dev environment is Linux. Trigger manually via workflow_dispatch.
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Qt6
        run: brew install qt

      - name: Set QT6_DIR
        run: echo "QT6_DIR=$(brew --prefix qt)/lib/cmake/Qt6" >> "$GITHUB_ENV"

      - name: Install Conan
        run: pip install conan

      - name: Auto-detect Conan profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-macos-arm64-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-macos-arm64-

      - name: Install dependencies
        run: |
          conan install . --build=missing \
            -s build_type=Release \
            -s compiler.cppstd=23 \
            -s os.version=13.0 \
            -o with_tests=True

      - name: Configure CMake
        run: |
          cmake --preset release -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build
        run: cmake --build --preset release

      - name: Run unit tests
        run: ./build/Release/bin/tests/unit_tests

      - name: Run integration tests
        run: ./build/Release/bin/tests/integration_tests

      - name: Run UI tests (offscreen)
        run: QT_QPA_PLATFORM=offscreen ctest --test-dir build/Release -R "^test_" --output-on-failure

      - name: Upload CTest log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-macos-log
          path: build/Release/Testing/Temporary/LastTest.log
          if-no-files-found: ignore
