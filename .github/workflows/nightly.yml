name: Nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  strategy-correctness:
    name: Strategy Correctness Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 150

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for recent changes
        id: check
        uses: ./.github/actions/check-nightly-skip
        with:
          job-name: Strategy Correctness Tests

      - name: Install system dependencies
        if: steps.check.outputs.skip != 'true'
        uses: ./.github/actions/install-qt-deps

      - name: Install Conan
        if: steps.check.outputs.skip != 'true'
        run: |
          pip3 install conan
          conan profile detect --force

      - name: Cache Conan packages
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          # sha-suffixed (see ci.yml): save a per-commit conan cache including the
          # from-source Catch2 build so the next nightly restores it instead of
          # rebuilding — keeps the p/b/catch<hash>/ include path stable across runs
          # so the test-executable TUs hit ccache.
          key: conan-${{ runner.os }}-relwithdebinfo-${{ hashFiles('conanfile.py') }}-${{ github.sha }}
          restore-keys: |
            conan-${{ runner.os }}-relwithdebinfo-${{ hashFiles('conanfile.py') }}-
            conan-${{ runner.os }}-relwithdebinfo-

      - name: Cache ccache
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-rwdi-nocov-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-rwdi-nocov-

      - name: Configure ccache
        if: steps.check.outputs.skip != 'true'
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: conan install . --build=missing -s build_type=RelWithDebInfo -s compiler.cppstd=gnu23

      - name: Build
        if: steps.check.outputs.skip != 'true'
        # Coverage off: this job only runs the [strategy] suite, never gcovr.
        # Instrumentation would slow the 150-min replay and bloat the cache for
        # no benefit. Distinct rwdi-nocov flavor (different objects than rwdi-cov).
        run: |
          cmake --preset relwithdebinfo -DSUDOKU_ENABLE_COVERAGE=OFF
          cmake --build --preset relwithdebinfo

      - name: Show ccache stats
        if: steps.check.outputs.skip != 'true'
        run: ccache --show-stats

      - name: Run strategy correctness tests
        if: steps.check.outputs.skip != 'true'
        run: |
          # Find the unit_tests binary (Conan output structure varies by version)
          UNIT_TESTS=$(find build/RelWithDebInfo -name unit_tests -type f | head -1)
          echo "Running: $UNIT_TESTS [strategy]"
          "$UNIT_TESTS" "[strategy]"

      - name: Propagate previous failure
        if: steps.check.outputs.previous-failed == 'true'
        run: |
          echo "::error::No new commits since the last real nightly run, which FAILED for this job."
          echo "::error::Push a fix or use workflow_dispatch to re-run."
          exit 1

  sanitizer-check:
    name: ASan + UBSan
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for recent changes
        id: check
        uses: ./.github/actions/check-nightly-skip
        with:
          job-name: ASan + UBSan

      - name: Install system dependencies
        if: steps.check.outputs.skip != 'true'
        uses: ./.github/actions/install-qt-deps

      - name: Install Conan
        if: steps.check.outputs.skip != 'true'
        run: |
          pip3 install conan
          conan profile detect --force

      - name: Cache Conan packages
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          # sha-suffixed (see ci.yml): save a per-commit conan cache including the
          # from-source Catch2 build so the next nightly restores it instead of
          # rebuilding — keeps the p/b/catch<hash>/ include path stable across runs
          # so the test-executable TUs hit ccache.
          key: conan-${{ runner.os }}-release-${{ hashFiles('conanfile.py') }}-${{ github.sha }}
          restore-keys: |
            conan-${{ runner.os }}-release-${{ hashFiles('conanfile.py') }}-
            conan-${{ runner.os }}-release-

      - name: Cache ccache
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-rel-san-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-rel-san-

      - name: Configure ccache
        if: steps.check.outputs.skip != 'true'
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: conan install . --build=missing -s build_type=Release -s compiler.cppstd=gnu23

      - name: Build with sanitizers
        if: steps.check.outputs.skip != 'true'
        run: |
          cmake --preset release -DENABLE_SANITIZERS=ON
          cmake --build --preset release

      - name: Show ccache stats
        if: steps.check.outputs.skip != 'true'
        run: ccache --show-stats

      - name: Run unit tests under ASan + UBSan
        if: steps.check.outputs.skip != 'true'
        env:
          ASAN_OPTIONS: "detect_leaks=1:detect_stack_use_after_return=1:check_initialization_order=1:strict_init_order=1:halt_on_error=1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
        run: |
          if [ -f "build/Release/build/Release/bin/tests/unit_tests" ]; then
            UNIT_TESTS="build/Release/build/Release/bin/tests/unit_tests"
          else
            UNIT_TESTS="build/Release/bin/tests/unit_tests"
          fi
          echo "Running: $UNIT_TESTS"
          "$UNIT_TESTS" "~[slow]~[pathological]"

      - name: Run integration tests under ASan + UBSan
        if: steps.check.outputs.skip != 'true'
        env:
          ASAN_OPTIONS: "detect_leaks=1:detect_stack_use_after_return=1:check_initialization_order=1:strict_init_order=1:halt_on_error=1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
        run: |
          if [ -f "build/Release/build/Release/bin/tests/integration_tests" ]; then
            INTEGRATION_TESTS="build/Release/build/Release/bin/tests/integration_tests"
          else
            INTEGRATION_TESTS="build/Release/bin/tests/integration_tests"
          fi
          echo "Running: $INTEGRATION_TESTS"
          "$INTEGRATION_TESTS"

      - name: Propagate previous failure
        if: steps.check.outputs.previous-failed == 'true'
        run: |
          echo "::error::No new commits since the last real nightly run, which FAILED for this job."
          echo "::error::Push a fix or use workflow_dispatch to re-run."
          exit 1

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for recent changes
        id: check
        uses: ./.github/actions/check-nightly-skip
        with:
          job-name: clang-tidy

      - name: Install system dependencies
        if: steps.check.outputs.skip != 'true'
        uses: ./.github/actions/install-qt-deps

      - name: Install clang-tidy
        if: steps.check.outputs.skip != 'true'
        run: |
          if sudo apt-get install -y clang-tidy-19; then
            sudo ln -sf /usr/bin/clang-tidy-19 /usr/local/bin/clang-tidy
          else
            sudo apt-get install -y clang-tidy
          fi

      - name: Install Conan
        if: steps.check.outputs.skip != 'true'
        run: |
          pip3 install conan
          conan profile detect --force

      - name: Cache Conan packages
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          # sha-suffixed (see ci.yml): save a per-commit conan cache including the
          # from-source Catch2 build so the next nightly restores it instead of
          # rebuilding — keeps the p/b/catch<hash>/ include path stable across runs
          # so the test-executable TUs hit ccache.
          key: conan-${{ runner.os }}-relwithdebinfo-${{ hashFiles('conanfile.py') }}-${{ github.sha }}
          restore-keys: |
            conan-${{ runner.os }}-relwithdebinfo-${{ hashFiles('conanfile.py') }}-
            conan-${{ runner.os }}-relwithdebinfo-

      - name: Cache ccache
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-rwdi-cov-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-rwdi-cov-

      - name: Configure ccache
        if: steps.check.outputs.skip != 'true'
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: conan install . --build=missing -s build_type=RelWithDebInfo -s compiler.cppstd=gnu23

      - name: Build
        if: steps.check.outputs.skip != 'true'
        run: |
          cmake --preset relwithdebinfo
          cmake --build --preset relwithdebinfo

      - name: Show ccache stats
        if: steps.check.outputs.skip != 'true'
        run: ccache --show-stats

      - name: Run clang-tidy
        if: steps.check.outputs.skip != 'true'
        run: ./scripts/tidy.sh check

      - name: Propagate previous failure
        if: steps.check.outputs.previous-failed == 'true'
        run: |
          echo "::error::No new commits since the last real nightly run, which FAILED for this job."
          echo "::error::Push a fix or use workflow_dispatch to re-run."
          exit 1

  cppcheck:
    name: Cppcheck
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for recent changes
        id: check
        uses: ./.github/actions/check-nightly-skip
        with:
          job-name: Cppcheck

      - name: Install system dependencies
        if: steps.check.outputs.skip != 'true'
        uses: ./.github/actions/install-qt-deps

      - name: Install cppcheck and Conan
        if: steps.check.outputs.skip != 'true'
        run: |
          sudo apt-get install -y cppcheck
          pip3 install conan
          conan profile detect --force

      - name: Cache Conan packages
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          # sha-suffixed (see ci.yml): save a per-commit conan cache including the
          # from-source Catch2 build so the next nightly restores it instead of
          # rebuilding — keeps the p/b/catch<hash>/ include path stable across runs
          # so the test-executable TUs hit ccache.
          key: conan-${{ runner.os }}-release-${{ hashFiles('conanfile.py') }}-${{ github.sha }}
          restore-keys: |
            conan-${{ runner.os }}-release-${{ hashFiles('conanfile.py') }}-
            conan-${{ runner.os }}-release-

      - name: Cache ccache
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-rel-plain-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-rel-plain-

      - name: Configure ccache
        if: steps.check.outputs.skip != 'true'
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Build for compile database
        if: steps.check.outputs.skip != 'true'
        run: |
          conan install . --build=missing -s build_type=Release -s compiler.cppstd=gnu23
          cmake --preset release
          cmake --build --preset release

      - name: Run cppcheck
        if: steps.check.outputs.skip != 'true'
        run: ./scripts/cppcheck.sh

      - name: Propagate previous failure
        if: steps.check.outputs.previous-failed == 'true'
        run: |
          echo "::error::No new commits since the last real nightly run, which FAILED for this job."
          echo "::error::Push a fix or use workflow_dispatch to re-run."
          exit 1

  cpd:
    name: Copy-Paste Detection
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for recent changes
        id: check
        uses: ./.github/actions/check-nightly-skip
        with:
          job-name: Copy-Paste Detection

      - name: Install Java
        if: steps.check.outputs.skip != 'true'
        run: sudo apt-get install -y default-jre-headless

      - name: Install PMD
        if: steps.check.outputs.skip != 'true'
        run: |
          PMD_VERSION="7.21.0"
          curl -sL "https://github.com/pmd/pmd/releases/download/pmd_releases%2F${PMD_VERSION}/pmd-dist-${PMD_VERSION}-bin.zip" -o /tmp/pmd.zip
          mkdir -p "$HOME/.local/share/pmd"
          unzip -q /tmp/pmd.zip -d "$HOME/.local/share/pmd"
          rm /tmp/pmd.zip

      - name: Run CPD
        if: steps.check.outputs.skip != 'true'
        run: ./scripts/cpd.sh

      - name: Propagate previous failure
        if: steps.check.outputs.previous-failed == 'true'
        run: |
          echo "::error::No new commits since the last real nightly run, which FAILED for this job."
          echo "::error::Push a fix or use workflow_dispatch to re-run."
          exit 1
